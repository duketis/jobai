# jobai — single-service Docker Compose deployment.
#
# `docker compose up -d` boots the API + scheduler + agent on
# http://localhost:8421. The SQLite DB persists under the `jobai-data`
# named volume; deleting the container leaves the data intact.
#
# The agent has two backends, picked via JOBAI_AGENT_BACKEND in .env:
#
#   * ``api`` (default) — uses ANTHROPIC_API_KEY against the
#     Anthropic API. Pay-per-token billing.
#   * ``subscription`` — uses your Claude Pro/Max plan via the
#     ``claude`` CLI bundled into the image. Set CLAUDE_CODE_OAUTH_TOKEN
#     in .env (run ``claude setup-token`` on your host to get one).
#     No API key needed; calls bill against your Max quota.
#
# Either mode is independent — the data + API endpoints work
# without either being configured; only /api/agent/chat depends on
# the chosen backend.

services:
  jobai:
    build: .
    image: jobai:latest
    container_name: jobai
    restart: unless-stopped
    ports:
      - "8421:8421"
    env_file:
      - .env
    environment:
      # Override-able by .env, but these are sensible defaults.
      - JOBAI_DB_PATH=/data/jobai.db
      # Where the per-job tailored folders land. Default
      # ``/data/tailored`` writes them inside the ``jobai-data`` named
      # volume so they persist across container rebuilds. Override in
      # ``.env`` with ``JOBAI_TAILOR_OUTPUT_DIR=/your/host/path`` AND
      # add a bind mount under ``volumes`` if you want the folders
      # outside Docker for direct drag-and-drop into apply forms:
      #
      #   volumes:
      #     - jobai-data:/data
      #     - ${HOME}/jobai-tailored:/host-tailored
      #   environment:
      #     - JOBAI_TAILOR_OUTPUT_DIR=/host-tailored
      - JOBAI_TAILOR_OUTPUT_DIR=/data/tailored
    volumes:
      - jobai-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8421/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - default

volumes:
  jobai-data:

# Attach to the shared ``ai-tailor-network`` so the tailor routes can reach
# resumeai (:8765) + coverletterai (:8766) by service name. Whichever sibling
# you bring up first creates the network; if jobai is first and the network
# doesn't exist yet, ``docker compose up`` fails fast with a clear message --
# bring up the siblings first, or pre-create the network with
# ``docker network create ai-tailor-network``.
networks:
  default:
    name: ai-tailor-network
    external: true
