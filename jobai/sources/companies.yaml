# Bulk source seed file.
#
# Each top-level key is a source kind (must be registered in
# jobai.sources.registry); each entry under it becomes one row in the
# sources table when `jobai source sync` runs.
#
# Required per-entry: account, display_name.
# Optional per-entry: default_tier (1/2/3), enabled (true/false),
#                     cadence_seconds.
#
# Curated for AU-relevant tech companies plus a handful of high-signal
# global names. Add more freely; sync is idempotent (existing rows have
# their display_name / tier / cadence updated, but the enabled flag is
# preserved so admin toggles stick).

greenhouse:
  - account: atlassian
    display_name: Atlassian
  - account: canva
    display_name: Canva
  - account: cultureamp
    display_name: Culture Amp
  - account: linktree
    display_name: Linktree
  - account: octopusdeploy
    display_name: Octopus Deploy
  - account: safetyculture
    display_name: SafetyCulture
  - account: anthropic
    display_name: Anthropic
  - account: cloudflare
    display_name: Cloudflare
  - account: stripe
    display_name: Stripe
  - account: airbnb
    display_name: Airbnb
  - account: figma
    display_name: Figma
  - account: vercel
    display_name: Vercel
  - account: notion
    display_name: Notion
  - account: discord
    display_name: Discord
  - account: gitlab
    display_name: GitLab
  - account: hashicorp
    display_name: HashiCorp
  - account: elastic
    display_name: Elastic
  - account: datadog
    display_name: Datadog
  - account: mongodb
    display_name: MongoDB
  - account: snowflake
    display_name: Snowflake

lever:
  - account: palantir
    display_name: Palantir Technologies

ashby:
  - account: linear
    display_name: Linear
  - account: vanta
    display_name: Vanta
  - account: mercor
    display_name: Mercor

workable:
  - account: huggingface
    display_name: Hugging Face

smartrecruiters:
  - account: visa
    display_name: Visa

# Seek is JS-rendered — needs the browser fetcher (default_tier: 2).
# Account is the URL slug from the Seek search-results path. Add more
# slugs to broaden coverage; each one runs as its own source row.
seek:
  - account: python-jobs/in-All-Australia
    display_name: Seek — Python (Australia)
    default_tier: 2
    cadence_seconds: 3600
  - account: software-engineer-jobs/in-All-Melbourne-VIC
    display_name: Seek — Software Engineer (Melbourne)
    default_tier: 2
    cadence_seconds: 3600
  - account: software-engineer-jobs/in-All-Sydney-NSW
    display_name: Seek — Software Engineer (Sydney)
    default_tier: 2
    cadence_seconds: 3600
  - account: backend-developer-jobs/in-All-Australia
    display_name: Seek — Backend (Australia)
    default_tier: 2
    cadence_seconds: 3600
  - account: full-stack-developer-jobs/in-All-Australia
    display_name: Seek — Full Stack (Australia)
    default_tier: 2
    cadence_seconds: 3600

# LinkedIn fingerprints aggressively — needs the stealth (Patchright)
# fetcher (default_tier: 3). Account is the URL-encoded query string
# for /jobs/search.
linkedin:
  - account: keywords=python&location=Australia
    display_name: LinkedIn — Python (Australia)
    default_tier: 3
    cadence_seconds: 7200
  - account: keywords=software%20engineer&location=Australia
    display_name: LinkedIn — Software Engineer (Australia)
    default_tier: 3
    cadence_seconds: 7200
  - account: keywords=backend%20engineer&location=Australia
    display_name: LinkedIn — Backend Engineer (Australia)
    default_tier: 3
    cadence_seconds: 7200

# Indeed serves a JS-heavy SPA but embeds an SSR data island. Browser
# tier (2) is enough to render the island; promotes to stealth on 403.
indeed:
  - account: q=python&l=Australia&fromage=7
    display_name: Indeed — Python (Australia, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: q=software+engineer&l=Australia&fromage=7
    display_name: Indeed — Software Engineer (Australia, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: q=python&l=Melbourne+VIC&fromage=7
    display_name: Indeed — Python (Melbourne, last 7d)
    default_tier: 2
    cadence_seconds: 3600

# APS Jobs — Australian federal government central job board.
# Atom feed under /s/search.atom; HTTP-friendly so default_tier: 1.
# Account is the URL-encoded query (empty = full open feed).
apsjobs:
  - account: ""
    display_name: APS Jobs — All open positions
    default_tier: 1
    cadence_seconds: 7200
  - account: Keywords=software
    display_name: APS Jobs — Software
    default_tier: 1
    cadence_seconds: 7200
  - account: Keywords=data
    display_name: APS Jobs — Data
    default_tier: 1
    cadence_seconds: 7200
