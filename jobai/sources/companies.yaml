# Bulk source seed file.
#
# Each top-level key is a source kind (must be registered in
# jobai.sources.registry); each entry under it becomes one row in the
# sources table when `jobai source sync` runs.
#
# Required per-entry: account, display_name.
# Optional per-entry: default_tier (1/2/3), enabled (true/false),
#                     cadence_seconds.
#
# Curated for AU-relevant tech companies plus a handful of high-signal
# global names. Add more freely; sync is idempotent (existing rows have
# their display_name / tier / cadence updated, but the enabled flag is
# preserved so admin toggles stick).

