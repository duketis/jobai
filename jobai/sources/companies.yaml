# SmartRecruiters — api.smartrecruiters.com/v1/companies/<slug>/postings.
# Manual seed kept intentionally small. ``jobai source discover --register``
# auto-adds any other slugs whose apply URLs we've already scraped via
# Seek / Indeed / LinkedIn -- it's the right way to keep coverage current
# without hand-curating the list.
smartrecruiters:
  - account: visa
    display_name: Visa
  - account: canva
    display_name: Canva
  - account: SEEK
    display_name: SEEK (Australia)

# Workable: deliberately empty list. The widget API path we use
# (``apply.workable.com/api/v1/widget/accounts/{slug}``) still works,
# but a 2026-05 audit of common AU SaaS company slugs found near-zero
# Workable adoption among AU employers - SafetyCulture, Canva,
# Octopus Deploy, Atlassian and the rest moved to Greenhouse/Ashby/
# Lever/SmartRecruiters years ago. Of the candidates probed, only
# Hugging Face responded with active jobs and they post 0 AU-located
# roles. Re-enable per-account if you find an AU company that ships
# real positions through Workable; the source code itself is intact.
workable: []

# Seek is JS-rendered — needs the browser fetcher (default_tier: 2).
# Account is the URL slug from the Seek search-results path. The
# default seeds below are LOCATION-only (no role keyword) so the app
# is generic across job categories — add narrower slugs (e.g.
# `python-jobs/in-All-Australia`) per-deployment if you want a
# specific feed alongside the broad ones.
seek:
  - account: jobs/in-All-Australia
    display_name: Seek — All jobs (Australia)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Melbourne-VIC
    display_name: Seek — All jobs (Melbourne)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Sydney-NSW
    display_name: Seek — All jobs (Sydney)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Brisbane-QLD
    display_name: Seek — All jobs (Brisbane)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Perth-WA
    display_name: Seek — All jobs (Perth)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Adelaide-SA
    display_name: Seek — All jobs (Adelaide)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Canberra-ACT
    display_name: Seek — All jobs (Canberra)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Hobart-TAS
    display_name: Seek — All jobs (Hobart)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Darwin-NT
    display_name: Seek — All jobs (Darwin)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Newcastle-NSW
    display_name: Seek — All jobs (Newcastle)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Gold-Coast-QLD
    display_name: Seek — All jobs (Gold Coast)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Geelong-VIC
    display_name: Seek — All jobs (Geelong)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Wollongong-NSW
    display_name: Seek — All jobs (Wollongong)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Sunshine-Coast-QLD
    display_name: Seek — All jobs (Sunshine Coast)
    default_tier: 2
    cadence_seconds: 3600
  # ``worktype=242`` = Seek's Remote work-type filter. Catches
  # remote roles that the city slugs cap out before reaching.
  - account: jobs/in-All-Australia?worktype=242
    display_name: Seek — Remote jobs (Australia)
    default_tier: 2
    cadence_seconds: 3600

# LinkedIn fingerprints aggressively — needs the stealth (Patchright)
# fetcher (default_tier: 3). Account is the URL-encoded query string
# for /jobs/search. Anonymous LinkedIn caps at ~1,000 results per
# query, so multiplying location slugs is the lever. Each slug is
# LOCATION-only (no `keywords`) to keep the catalogue generic.
linkedin:
  - account: location=Australia
    display_name: LinkedIn — All jobs (Australia)
    default_tier: 3
    cadence_seconds: 3600
  - account: location=Melbourne%2C%20Victoria%2C%20Australia
    display_name: LinkedIn — All jobs (Melbourne)
    default_tier: 3
    cadence_seconds: 3600
  - account: location=Sydney%2C%20New%20South%20Wales%2C%20Australia
    display_name: LinkedIn — All jobs (Sydney)
    default_tier: 3
    cadence_seconds: 3600
  - account: location=Brisbane%2C%20Queensland%2C%20Australia
    display_name: LinkedIn — All jobs (Brisbane)
    default_tier: 3
    cadence_seconds: 3600
  - account: location=Perth%2C%20Western%20Australia%2C%20Australia
    display_name: LinkedIn — All jobs (Perth)
    default_tier: 3
    cadence_seconds: 3600
  - account: location=Adelaide%2C%20South%20Australia%2C%20Australia
    display_name: LinkedIn — All jobs (Adelaide)
    default_tier: 3
    cadence_seconds: 3600
  - account: location=Canberra%2C%20Australian%20Capital%20Territory%2C%20Australia
    display_name: LinkedIn — All jobs (Canberra)
    default_tier: 3
    cadence_seconds: 3600
  - account: location=Hobart%2C%20Tasmania%2C%20Australia
    display_name: LinkedIn — All jobs (Hobart)
    default_tier: 3
    cadence_seconds: 3600
  - account: location=Darwin%2C%20Northern%20Territory%2C%20Australia
    display_name: LinkedIn — All jobs (Darwin)
    default_tier: 3
    cadence_seconds: 3600
  # Work-mode filter ``f_WT=2`` = remote-only on LinkedIn. Catches
  # remote roles that the city-anchored slugs cap out before reaching.
  - account: location=Australia&f_WT=2
    display_name: LinkedIn — Remote jobs (Australia)
    default_tier: 3
    cadence_seconds: 3600

# Indeed serves a JS-heavy SPA but embeds an SSR data island. Browser
# tier (2) is enough to render the island; promotes to stealth on 403.
# Anonymous Indeed forces auth after page 1 (~15 jobs/query), so
# multiplying slugs is the only way to grow coverage. We use every
# capital city + a few regional centres + the national catchall.
indeed:
  - account: l=Australia&fromage=7
    display_name: Indeed — All jobs (Australia, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Melbourne+VIC&fromage=7
    display_name: Indeed — All jobs (Melbourne, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Sydney+NSW&fromage=7
    display_name: Indeed — All jobs (Sydney, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Brisbane+QLD&fromage=7
    display_name: Indeed — All jobs (Brisbane, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Perth+WA&fromage=7
    display_name: Indeed — All jobs (Perth, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Adelaide+SA&fromage=7
    display_name: Indeed — All jobs (Adelaide, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Canberra+ACT&fromage=7
    display_name: Indeed — All jobs (Canberra, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Hobart+TAS&fromage=7
    display_name: Indeed — All jobs (Hobart, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Darwin+NT&fromage=7
    display_name: Indeed — All jobs (Darwin, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Newcastle+NSW&fromage=7
    display_name: Indeed — All jobs (Newcastle, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Gold+Coast+QLD&fromage=7
    display_name: Indeed — All jobs (Gold Coast, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Geelong+VIC&fromage=7
    display_name: Indeed — All jobs (Geelong, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Wollongong+NSW&fromage=7
    display_name: Indeed — All jobs (Wollongong, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Sunshine+Coast+QLD&fromage=7
    display_name: Indeed — All jobs (Sunshine Coast, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Cairns+QLD&fromage=7
    display_name: Indeed — All jobs (Cairns, last 7d)
    default_tier: 2
