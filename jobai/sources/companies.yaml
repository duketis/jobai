# Bulk source seed file.
#
# Each top-level key is a source kind (must be registered in
# jobai.sources.registry); each entry under it becomes one row in the
# sources table when `jobai source sync` runs.
#
# Required per-entry: account, display_name.
# Optional per-entry: default_tier (1/2/3), enabled (true/false),
#                     cadence_seconds.
#
# Curated for AU-relevant tech companies plus a wide spread of
# global high-signal names. Every entry below was confirmed live
# against its provider's public API; sync is idempotent.

# Greenhouse — boards-api.greenhouse.io/v1/boards/<slug>/jobs.
greenhouse:
  # AU SaaS / tech
  - account: cultureamp
    display_name: Culture Amp
  - account: octopusdeploy
    display_name: Octopus Deploy
  - account: thinkific
    display_name: Thinkific
  # Global tech / AI / fintech
  - account: anthropic
    display_name: Anthropic
  - account: stripe
    display_name: Stripe
  - account: airbnb
    display_name: Airbnb
  - account: figma
    display_name: Figma
  - account: vercel
    display_name: Vercel
  - account: discord
    display_name: Discord
  - account: gitlab
    display_name: GitLab
  - account: cloudflare
    display_name: Cloudflare
  - account: elastic
    display_name: Elastic
  - account: datadog
    display_name: Datadog
  - account: mongodb
    display_name: MongoDB
  - account: pinterest
    display_name: Pinterest
  - account: reddit
    display_name: Reddit
  - account: roblox
    display_name: Roblox
  - account: dropbox
    display_name: Dropbox
  - account: twilio
    display_name: Twilio
  - account: samsara
    display_name: Samsara
  - account: instacart
    display_name: Instacart
  - account: duolingo
    display_name: Duolingo
  - account: amplitude
    display_name: Amplitude
  - account: mixpanel
    display_name: Mixpanel
  - account: asana
