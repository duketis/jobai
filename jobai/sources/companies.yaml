# Workable boards moved off the public API path we used (v3/accounts).
# Disabled until we find an updated endpoint that still serves
# Hugging Face / SafetyCulture / similar AU SaaS users of Workable.
workable: []

# Seek is JS-rendered — needs the browser fetcher (default_tier: 2).
# Account is the URL slug from the Seek search-results path. Add more
# slugs to broaden coverage; each one runs as its own source row.
seek:
  - account: python-jobs/in-All-Australia
    display_name: Seek — Python (Australia)
    default_tier: 2
    cadence_seconds: 3600
  - account: software-engineer-jobs/in-All-Melbourne-VIC
    display_name: Seek — Software Engineer (Melbourne)
    default_tier: 2
    cadence_seconds: 3600
  - account: software-engineer-jobs/in-All-Sydney-NSW
    display_name: Seek — Software Engineer (Sydney)
    default_tier: 2
    cadence_seconds: 3600
  - account: backend-developer-jobs/in-All-Australia
    display_name: Seek — Backend (Australia)
    default_tier: 2
    cadence_seconds: 3600
  - account: full-stack-developer-jobs/in-All-Australia
    display_name: Seek — Full Stack (Australia)
    default_tier: 2
    cadence_seconds: 3600

# LinkedIn fingerprints aggressively — needs the stealth (Patchright)
# fetcher (default_tier: 3). Account is the URL-encoded query string
# for /jobs/search.
linkedin:
  - account: keywords=python&location=Australia
    display_name: LinkedIn — Python (Australia)
    default_tier: 3
    cadence_seconds: 7200
  - account: keywords=software%20engineer&location=Australia
    display_name: LinkedIn — Software Engineer (Australia)
    default_tier: 3
    cadence_seconds: 7200
  - account: keywords=backend%20engineer&location=Australia
    display_name: LinkedIn — Backend Engineer (Australia)
    default_tier: 3
    cadence_seconds: 7200

# Indeed serves a JS-heavy SPA but embeds an SSR data island. Browser
# tier (2) is enough to render the island; promotes to stealth on 403.
indeed:
  - account: q=python&l=Australia&fromage=7
    display_name: Indeed — Python (Australia, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: q=software+engineer&l=Australia&fromage=7
    display_name: Indeed — Software Engineer (Australia, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: q=python&l=Melbourne+VIC&fromage=7
    display_name: Indeed — Python (Melbourne, last 7d)
    default_tier: 2
    cadence_seconds: 3600

# NSW Government — iworkfor.nsw.gov.au, a Next.js SPA. Browser
# tier with wait_for_selector lands the rendered job-card list. Each
# slug below is the URL path fragment after iworkfor.nsw.gov.au/.
nsw_iworkfor:
  - account: jobs/all-keywords/all-agencies/all-organisations-entities/all-categories/all-locations/all-worktypes
    display_name: NSW Government — All open positions
    default_tier: 2
    cadence_seconds: 7200
  - account: jobs/all-keywords/health/all-organisations-entities/all-categories/all-locations/all-worktypes?divisionid=1
    display_name: NSW Government — Health
    default_tier: 2
    cadence_seconds: 7200
  - account: jobs/all-keywords/education/all-organisations-entities/all-categories/all-locations/all-worktypes?divisionid=7
    display_name: NSW Government — Education
    default_tier: 2
    cadence_seconds: 7200

# QLD Government — smartjobs.qld.gov.au, an NGA Talent Solutions
# board. The default unfiltered search-results URL is plain HTTP
# (default_tier: 1) and serves all open positions in one request.
qld_smartjobs:
  - account: "14904"
    display_name: QLD Government — All open positions
    default_tier: 1
    cadence_seconds: 7200

# NOTE: VIC (jobs.careers.vic.gov.au), SA (iworkfor.sa.gov.au), and
# WA (search.jobs.wa.gov.au) all sit behind multi-step form-submission
# search flows, not at stable GET URLs. They need a Playwright
# form-fill workflow (page.fill + click + wait) which is queued for
# a future "WorkflowFetcher" capability — not currently seeded.

# APS Jobs migrated to a Salesforce Lightning SPA in 2026; the Atom
# feed at /s/search.atom no longer exists and the new endpoints
# require Salesforce Aura/Lightning XHR calls that the parser
# doesn't yet speak. Entries are seeded but disabled until the
# Salesforce integration ships.
apsjobs:
  - account: ""
    display_name: APS Jobs — All open positions
    default_tier: 1
    cadence_seconds: 7200
    enabled: false
  - account: Keywords=software
    display_name: APS Jobs — Software
    default_tier: 1
    cadence_seconds: 7200
    enabled: false
  - account: Keywords=data
    display_name: APS Jobs — Data
    default_tier: 1
    cadence_seconds: 7200
    enabled: false
