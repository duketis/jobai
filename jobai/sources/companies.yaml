# Workable boards moved off the public API path we used (v3/accounts).
# Disabled until we find an updated endpoint that still serves
# Hugging Face / SafetyCulture / similar AU SaaS users of Workable.
workable: []

# Seek is JS-rendered — needs the browser fetcher (default_tier: 2).
# Account is the URL slug from the Seek search-results path. The
# default seeds below are LOCATION-only (no role keyword) so the app
# is generic across job categories — add narrower slugs (e.g.
# `python-jobs/in-All-Australia`) per-deployment if you want a
# specific feed alongside the broad ones.
seek:
  - account: jobs/in-All-Australia
    display_name: Seek — All jobs (Australia)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Melbourne-VIC
    display_name: Seek — All jobs (Melbourne)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Sydney-NSW
    display_name: Seek — All jobs (Sydney)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Brisbane-QLD
    display_name: Seek — All jobs (Brisbane)
    default_tier: 2
    cadence_seconds: 3600
  - account: jobs/in-All-Perth-WA
    display_name: Seek — All jobs (Perth)
    default_tier: 2
    cadence_seconds: 3600

# LinkedIn fingerprints aggressively — needs the stealth (Patchright)
# fetcher (default_tier: 3). Account is the URL-encoded query string
# for /jobs/search. Default seeds are LOCATION-only (no `keywords`)
# so the app is generic across job categories.
linkedin:
  - account: location=Australia
    display_name: LinkedIn — All jobs (Australia)
    default_tier: 3
    cadence_seconds: 3600
  - account: location=Melbourne%2C%20Victoria%2C%20Australia
    display_name: LinkedIn — All jobs (Melbourne)
    default_tier: 3
    cadence_seconds: 3600
  - account: location=Sydney%2C%20New%20South%20Wales%2C%20Australia
    display_name: LinkedIn — All jobs (Sydney)
    default_tier: 3
    cadence_seconds: 3600

# Indeed serves a JS-heavy SPA but embeds an SSR data island. Browser
# tier (2) is enough to render the island; promotes to stealth on 403.
# Default seeds are LOCATION-only (no `q`).
indeed:
  - account: l=Australia&fromage=7
    display_name: Indeed — All jobs (Australia, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Melbourne+VIC&fromage=7
    display_name: Indeed — All jobs (Melbourne, last 7d)
    default_tier: 2
    cadence_seconds: 3600
  - account: l=Sydney+NSW&fromage=7
    display_name: Indeed — All jobs (Sydney, last 7d)
    default_tier: 2
    cadence_seconds: 3600

# NSW Government — iworkfor.nsw.gov.au, a Next.js SPA fronted by
# Cloudflare strict-challenge mode (May 2026 onward). The source
# class declares ``needs_persistent_session = True`` so the runner
# builds a tier-3 fetcher with one long-lived browser context;
# Cloudflare's challenge resolves once at the start of each scrape
# cycle and the cleared session walks every paginated request.
# Account is the URL path fragment after iworkfor.nsw.gov.au/.
nsw_iworkfor:
  - account: jobs
    display_name: NSW Government — All open positions
    default_tier: 3
    cadence_seconds: 3600

# QLD Government — smartjobs.qld.gov.au, an NGA Talent Solutions
# board. The default unfiltered search-results URL is plain HTTP
# (default_tier: 1) and serves all open positions in one request.
qld_smartjobs:
  - account: "14904"
    display_name: QLD Government — All open positions
    default_tier: 1
    cadence_seconds: 3600

# VIC Government — jobs.careers.vic.gov.au, also an NGA Talent
# Solutions board but its deployment requires submitting the search
# form (no direct GET to results). Driven via BrowserFetcher's
# run_in_page() escape hatch (default_tier: 2 with the form-fill
# workflow); cadence is 2h since the browser-tier round-trip is
# heavier than HTTP.
vic_careers:
  - account: "14123"
    display_name: VIC Government — All open positions
    default_tier: 2
    cadence_seconds: 3600

# SA Government — iworkfor.sa.gov.au. Behind a search form whose
# submit button is #brsSearchBtn; results render into a
# table.Report with cells keyed by data-fieldname. Driven via the
# same run_in_page() form-fill workflow as VIC.
sa_iworkfor:
  - account: jb/list/all
    display_name: SA Government — All open positions
    default_tier: 2
    cadence_seconds: 3600

# WA Government — search.jobs.wa.gov.au, same Report-table pattern
# as SA after a form submit. Driven via run_in_page() form-fill.
wa_jobs:
  - account: page.php?pageID=215
    display_name: WA Government — All open positions
    default_tier: 2
    cadence_seconds: 3600

# APS Jobs (federal AU public service). The Salesforce Lightning
# rewrite replays the retrieveJobListings Apex action over plain
# HTTP — see jobai/sources/apsjobs.py. Default is the unfiltered
# "All" feed; ``account`` accepts a free-text search string mapped
# to filter.searchString if you want a narrower per-deployment feed.
apsjobs:
  - account: ""
    display_name: APS Jobs — All open positions
    default_tier: 1
    cadence_seconds: 3600
